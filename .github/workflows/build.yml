name: Build Tauri Windows App

# 在打 tag（v1.0.0 等）时构建 Windows 安装包并发布；也可在 Actions 页面手动触发。
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: "GradeScope ${{ github.ref_name }}"
          releaseBody: "自动构建的 GradeScope Windows 版。下载 .exe 安装包即可安装。"
          releaseDraft: true
          prerelease: false
          args: "--bundles nsis"

      # 当不是 tag 触发（手动运行）时，把产物作为 Artifact 上传，方便直接下载
      - name: Upload artifacts (manual runs)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: gradescope-windows
          path: |
            src-tauri/target/**/release/bundle/**/*.exe
          if-no-files-found: ignore
