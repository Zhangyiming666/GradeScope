name: Build Tauri Releases

# 在打 tag（v1.0.0 等）时构建 Windows/macOS 安装包并发布；也可在 Actions 页面手动触发。
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            artifact_name: gradescope-windows
            bundles: nsis
            artifact_path: src-tauri/target/release/bundle/nsis/*.exe
          - platform: macos-latest
            artifact_name: gradescope-macos
            bundles: dmg
            artifact_path: src-tauri/target/release/bundle/dmg/*.dmg

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        run: |
          npm install -g pnpm@11.5.3
          node --version
          npm --version
          pnpm --version

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri bundle
        run: pnpm exec tauri build --bundles ${{ matrix.bundles }}

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download bundle artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: GradeScope ${{ github.ref_name }}
          body: |
            自动构建的 GradeScope 桌面版。

            - Windows 用户下载 `.exe` 安装包
            - macOS 用户下载 `.dmg` 安装包
          draft: false
          prerelease: false
          files: release-assets/*
          fail_on_unmatched_files: true
